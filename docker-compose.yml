services:
  futures-daily:
    image: futures-daily:latest
    build:
      context: .
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    container_name: futures-daily
    ports:
      - "8500:8500"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
      - /Users/rey/.openclaw/workspace-rsstsx-bot:/rsstsx:ro
    environment:
      - FUTURES_DAILY_CONFIG=/app/config/config.yaml
      - FUTURES_DAILY_DB=/app/data/futures_daily.db
      - no_proxy=localhost,127.0.0.1,::1,dce.com.cn,www.dce.com.cn,.dce.com.cn,*.dce.com.cn
      - NO_PROXY=localhost,127.0.0.1,::1,dce.com.cn,www.dce.com.cn,.dce.com.cn,*.dce.com.cn
    restart: unless-stopped
